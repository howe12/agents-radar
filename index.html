<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 agents-radar · AI 生态日报</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-bg:#1e1e2e; --sidebar-fg:#cdd6f4; --sidebar-hover:#313244;
  --sidebar-active:#45475a; --sidebar-accent:#89b4fa;
  --main-bg:#fafafa; --main-fg:#1e1e2e;
  --border:#e0e0e0; --code-bg:#f0f0f0; --link:#6c63ff;
  --card-bg:#fff; --card-shadow:0 1px 3px rgba(0,0,0,.08);
  --h1-color:#1e1e2e; --h2-color:#333; --h3-color:#444;
  --tag-bg:#eee; --tag-fg:#555;
  --table-border:#ddd; --table-head:#f5f5f5;
  --sidebar-width:280px; --topbar-height:48px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  font-size:15px; line-height:1.7; color:var(--main-fg);
  scroll-behavior:smooth;
}
html.dark{
  --sidebar-bg:#11111b; --sidebar-fg:#cdd6f4; --sidebar-hover:#1e1e2e;
  --sidebar-active:#313244; --sidebar-accent:#89b4fa;
  --main-bg:#1e1e2e; --main-fg:#cdd6f4;
  --border:#45475a; --code-bg:#313244; --link:#89b4fa;
  --card-bg:#313244; --card-shadow:0 1px 3px rgba(0,0,0,.3);
  --h1-color:#f5f5f5; --h2-color:#ddd; --h3-color:#ccc;
  --tag-bg:#45475a; --tag-fg:#bac2de;
  --table-border:#45475a; --table-head:#313244;
}
body{display:flex;min-height:100vh;background:var(--main-bg)}

/* ── Sidebar ──────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-width); min-width:var(--sidebar-width);
  background:var(--sidebar-bg); color:var(--sidebar-fg);
  display:flex;flex-direction:column;position:fixed;
  top:0;left:0;bottom:0;z-index:100;
  transition:transform .25s ease;overflow-y:auto;
  border-right:1px solid var(--border);
}
.sidebar-header{
  padding:20px 20px 12px;border-bottom:1px solid var(--border);
}
.sidebar-header h1{font-size:1.2rem;font-weight:700;color:var(--sidebar-accent)}
.sidebar-header .sub{font-size:.75rem;opacity:.6;margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-footer{padding:12px 20px;border-top:1px solid var(--border);font-size:.75rem;opacity:.5}
.sidebar-footer a{color:var(--sidebar-fg);text-decoration:none}

.date-group{margin-bottom:2px}
.date-toggle{
  display:flex;align-items:center;gap:6px;width:100%;
  padding:8px 20px;border:none;background:none;color:var(--sidebar-fg);
  font-size:.85rem;font-weight:600;cursor:pointer;text-align:left;
  transition:background .15s;
}
.date-toggle:hover{background:var(--sidebar-hover)}
.date-toggle .arrow{font-size:.65rem;transition:transform .2s;opacity:.5;min-width:12px}
.date-toggle .arrow.open{transform:rotate(90deg)}
.date-toggle .date-icon{margin-right:2px}
.report-list{display:none;padding:0 0 4px}
.report-list.open{display:block}
.report-link{
  display:block;padding:5px 20px 5px 42px;font-size:.8rem;
  color:var(--sidebar-fg);text-decoration:none;opacity:.75;
  transition:all .15s;border-left:2px solid transparent;
}
.report-link:hover{opacity:1;background:var(--sidebar-hover)}
.report-link.active{opacity:1;background:var(--sidebar-active);border-left-color:var(--sidebar-accent)}
.report-link .lang-badge{font-size:.65rem;margin-left:4px;opacity:.5}

.theme-toggle{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:10px 20px;border:none;background:none;color:var(--sidebar-fg);
  font-size:.8rem;cursor:pointer;transition:background .15s;
}
.theme-toggle:hover{background:var(--sidebar-hover)}
.theme-toggle .icon{font-size:1rem}

/* ── Mobile nav ────────────────────────────────────────────────── */
.nav-toggle{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:36px;height:36px;border:none;background:var(--card-bg);
  color:var(--main-fg);font-size:1.2rem;border-radius:6px;
  cursor:pointer;box-shadow:var(--card-shadow);
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* ── Main content ──────────────────────────────────────────────── */
.main{
  margin-left:var(--sidebar-width);flex:1;min-width:0;
  padding:40px 48px;max-width:900px;
}
.main-header{margin-bottom:32px}
.main-header h1{font-size:1.8rem;color:var(--h1-color);margin-bottom:4px}
.main-header .meta{font-size:.8rem;opacity:.5}
.content{}
.content h1{font-size:1.6rem;margin:28px 0 16px;color:var(--h1-color);border-bottom:2px solid var(--border);padding-bottom:8px}
.content h2{font-size:1.25rem;margin:24px 0 12px;color:var(--h2-color)}
.content h3{font-size:1.05rem;margin:18px 0 8px;color:var(--h3-color)}
.content h4{font-size:.95rem;margin:14px 0 6px;color:var(--h3-color)}
.content p{margin:8px 0}
.content a{color:var(--link);text-decoration:none}
.content a:hover{text-decoration:underline}
.content ul,.content ol{margin:8px 0;padding-left:24px}
.content li{margin:2px 0}
.content blockquote{
  margin:12px 0;padding:8px 16px;border-left:3px solid var(--sidebar-accent);
  background:var(--code-bg);border-radius:0 6px 6px 0;color:var(--main-fg)
}
.content code{
  background:var(--code-bg);padding:1px 5px;border-radius:4px;
  font-family:"JetBrains Mono","Fira Code",monospace;font-size:.85em
}
.content pre{
  background:var(--code-bg);padding:16px;border-radius:8px;
  overflow-x:auto;margin:12px 0;font-size:.82rem;line-height:1.5
}
.content pre code{background:none;padding:0}
.content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9rem}
.content th,.content td{padding:8px 12px;border:1px solid var(--table-border);text-align:left}
.content th{background:var(--table-head);font-weight:600}
.content hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.content strong{color:var(--h1-color)}
.content em{opacity:.8}
.content img{max-width:100%;border-radius:8px}

/* Quick nav tags */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tag{
  display:inline-block;padding:2px 10px;background:var(--tag-bg);
  color:var(--tag-fg);border-radius:12px;font-size:.75rem
}

/* Loading / Empty */
.loading{padding:40px 0;text-align:center;opacity:.5;font-size:1.1rem}
.empty{padding:60px 0;text-align:center;opacity:.4}
.empty .icon{font-size:3rem;margin-bottom:16px}

/* ── Responsive ────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .nav-toggle{display:flex;align-items:center;justify-content:center}
  .main{margin-left:0;padding:20px 16px}
}
</style>
</head>
<body>

<!-- Mobile nav toggle -->
<button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ── Sidebar ──────────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📡 agents-radar</h1>
    <div class="sub">AI 生态日报 · DeepSeek 驱动</div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <div class="loading" style="font-size:.85rem;padding:20px">加载中...</div>
  </nav>
  <div class="sidebar-footer">
    <button class="theme-toggle" id="themeToggle">
      <span class="icon">🌙</span> 深色模式
    </button>
    <div style="margin-top:8px">
      <a href="feed.xml">⊕ RSS</a> &nbsp;·&nbsp;
      <a href="https://github.com/howe12/agents-radar">GitHub</a>
    </div>
  </div>
</aside>

<!-- ── Main Content ─────────────────────────────────────────────── -->
<main class="main" id="main">
  <div class="main-header">
    <h1>📡 agents-radar</h1>
    <div class="meta">AI 工具生态日报 · 每日自动生成</div>
  </div>
  <div class="content" id="content">
    <div class="empty">
      <div class="icon">📡</div>
      <p>从左侧选择日期和报告查看内容</p>
    </div>
  </div>
</main>

<!-- ── Marked.js (CDN) ──────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────
let manifest = null;
let currentDate = null;
let currentReport = null;

// ── Labels ───────────────────────────────────────────────────────
const LABELS = {
  "ai-cli":        {zh:"AI CLI 工具",    en:"AI CLI Tools"},
  "ai-agents":     {zh:"AI Agents 生态", en:"AI Agents Ecosystem"},
  "ai-web":        {zh:"官网动态",       en:"Official Updates"},
  "ai-trending":   {zh:"GitHub 趋势",   en:"GitHub Trends"},
  "ai-hn":         {zh:"HN 社区动态",    en:"HN Community"},
  "ai-ph":         {zh:"Product Hunt",  en:"Product Hunt"},
  "ai-arxiv":      {zh:"ArXiv 研究",    en:"ArXiv Research"},
  "ai-hf":         {zh:"HF 模型",       en:"HF Models"},
  "ai-community":  {zh:"技术社区",       en:"Tech Community"},
  "ai-embodied":  {zh:"具身智能",       en:"Embodied AI"},
  "ai-weekly":     {zh:"AI 周刊",       en:"AI Weekly"},
  "ai-monthly":    {zh:"AI 月报",       en:"AI Monthly"},
};

function label(r) {
  const isEn = r.endsWith("-en");
  const base = isEn ? r.slice(0,-3) : r;
  const l = LABELS[base] || {zh:base, en:base};
  return isEn ? (l.en || base) + " (EN)" : l.zh || base;
}

function dateLabel(d) {
  // 2026-07-07 → 7月7日
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return d;
  return `${parseInt(m[2])}月${parseInt(m[3])}日`;
}

// ── Theme ────────────────────────────────────────────────────────
function setTheme(dark) {
  document.documentElement.classList.toggle("dark", dark);
  const btn = document.getElementById("themeToggle");
  btn.innerHTML = dark ? '<span class="icon">☀️</span> 浅色模式' : '<span class="icon">🌙</span> 深色模式';
  localStorage.setItem("agents-radar-theme", dark ? "dark" : "light");
}

document.getElementById("themeToggle").addEventListener("click", () => {
  setTheme(!document.documentElement.classList.contains("dark"));
});

// Init theme
const savedTheme = localStorage.getItem("agents-radar-theme");
if (savedTheme === "dark" || (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  setTheme(true);
}

// ── Mobile nav ───────────────────────────────────────────────────
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");
const navToggle = document.getElementById("navToggle");

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("open");
}
navToggle.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("open");
});
overlay.addEventListener("click", closeSidebar);

// ── Load manifest ────────────────────────────────────────────────
async function loadManifest() {
  try {
    const res = await fetch("manifest.json");
    manifest = await res.json();
    buildSidebar();
    // Handle hash on load
    handleHash();
  } catch(e) {
    document.getElementById("sidebarNav").innerHTML =
      '<div class="loading">加载 manifest 失败</div>';
  }
}

// ── Build sidebar ────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById("sidebarNav");
  if (!manifest || !manifest.dates) {
    nav.innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }

  let html = "";
  for (const entry of manifest.dates) {
    const d = entry.date;
    const reports = (entry.reports || []).filter(r => !r.endsWith("-en"));
    if (!reports.length) continue;
    html += `<div class="date-group">`;
    html += `<button class="date-toggle" data-date="${d}" onclick="toggleDate('${d}')">`;
    html += `<span class="arrow" id="arrow-${d}">▶</span>`;
    html += `<span class="date-icon">📅</span> ${dateLabel(d)}`;
    html += `<span style="margin-left:auto;font-size:.7rem;opacity:.4">${reports.length}</span>`;
    html += `</button>`;
    html += `<div class="report-list" id="list-${d}">`;
    for (const r of reports) {
      html += `<a class="report-link" href="#${d}/${r}" data-date="${d}" data-report="${r}" onclick="loadReport('${d}','${r}');closeSidebar();return false">`;
      html += label(r);
      html += `</a>`;
    }
    html += `</div></div>`;
  }
  nav.innerHTML = html;
}

// ── Toggle date group ────────────────────────────────────────────
function toggleDate(date) {
  const list = document.getElementById("list-" + date);
  const arrow = document.getElementById("arrow-" + date);
  const isOpen = list.classList.toggle("open");
  arrow.classList.toggle("open", isOpen);
}

// ── Load report ──────────────────────────────────────────────────
async function loadReport(date, report) {
  currentDate = date;
  currentReport = report;
  const content = document.getElementById("content");
  const h1 = document.querySelector(".main-header h1");
  const meta = document.querySelector(".main-header .meta");

  h1.textContent = label(report);
  meta.textContent = `${date} · ${report}`;
  content.innerHTML = '<div class="loading">加载中...</div>';

  // Update sidebar active state
  document.querySelectorAll(".report-link").forEach(el => el.classList.remove("active"));
  const link = document.querySelector(`.report-link[data-date="${date}"][data-report="${report}"]`);
  if (link) link.classList.add("active");

  // Auto-open the date group
  const list = document.getElementById("list-" + date);
  const arrow = document.getElementById("arrow-" + date);
  if (list && !list.classList.contains("open")) {
    list.classList.add("open");
    if (arrow) arrow.classList.add("open");
  }

  try {
    const res = await fetch(`digests/${date}/${report}.md`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    // Parse frontmatter if present
    let body = md;
    if (md.startsWith("---")) {
      const end = md.indexOf("---", 3);
      if (end !== -1) body = md.slice(end + 3);
    }
    content.innerHTML = marked.parse(body);
  } catch(e) {
    content.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>无法加载报告</p><p style="font-size:.8rem">${e.message}</p></div>`;
  }
}

// ── Hash handling ────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1); // remove #
  if (!hash) return;
  const parts = hash.split("/");
  if (parts.length >= 2) {
    const date = parts[0];
    const report = parts.slice(1).join("/");
    loadReport(date, report);
  }
}

window.addEventListener("hashchange", handleHash);

// ── Init ─────────────────────────────────────────────────────────
loadManifest();
</script>
</body>
</html>
